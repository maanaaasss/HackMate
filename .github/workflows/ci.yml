name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        # Provide placeholder public env vars so Next.js static pre-rendering
        # doesn't crash with "URL and API key are required" in pages that are
        # missing `export const dynamic = 'force-dynamic'`.
        # These are NEXT_PUBLIC_ (client-side) placeholders only — no secrets.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
        run: npm run build

      - name: Check for secret leaks
        run: node scripts/check-secrets.js